name: CI

# Läuft bei jedem Push auf master und bei jedem Pull Request.
on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build-test:
    # Windows-Runner: der LMU-Agent ist eine WinForms-Tray-App (net10.0-windows).
    runs-on: windows-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: .NET 10 SDK einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # --- LMU-Agent (Core, Service-Tray, UI) ---
      - name: LMU-Agent bauen
        run: dotnet build LMU_Agent/LMU.Agent.slnx -c Release

      - name: LMU-Agent testen
        run: dotnet test LMU_Agent/tests/LMU.Agent.Tests/LMU.Agent.Tests.csproj -c Release --no-build

      # --- Website (Build + Unit-Tests; kein PostgreSQL nötig) ---
      - name: Website bauen
        run: dotnet build SimracingUtility/SimracingUtility.csproj -c Release

      - name: Website testen
        run: dotnet test SimracingUtility.Tests/SimracingUtility.Tests/SimracingUtility.Tests.csproj -c Release
